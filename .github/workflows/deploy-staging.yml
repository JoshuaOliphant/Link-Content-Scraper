name: Deploy to Fly.io Staging

on:
  push:
    branches:
      - 'claude/**'  # Deploy any claude/ feature branch to staging
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest

    # Only run if not on main branch (safety check)
    if: github.ref != 'refs/heads/main'

    permissions:
      contents: write  # Required for createCommitComment

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check required secrets
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "❌ FLY_API_TOKEN secret is not set."
            echo ""
            echo "To fix this:"
            echo "  1. Run: flyctl auth token"
            echo "  2. Add the token to GitHub: Settings → Secrets → Actions → FLY_API_TOKEN"
            echo ""
            echo "Also ensure the staging app exists:"
            echo "  flyctl apps create link-content-scraper-staging"
            exit 1
          fi
          echo "✓ FLY_API_TOKEN is set"

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io Staging
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          flyctl deploy \
            --config fly.staging.toml \
            --app link-content-scraper-staging \
            --remote-only

      - name: Set Anthropic API Key Secret
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "Setting ANTHROPIC_API_KEY secret..."
            echo "$ANTHROPIC_API_KEY" | flyctl secrets set ANTHROPIC_API_KEY=- \
              --app link-content-scraper-staging
            echo "✓ ANTHROPIC_API_KEY set"
          else
            echo "⚠️  ANTHROPIC_API_KEY not found in GitHub secrets"
            echo "Agent features will not work without this key."
            echo "Add it via: Settings → Secrets → Actions → ANTHROPIC_API_KEY"
          fi

      - name: Comment on commit
        if: github.event_name == 'push'
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '## 🚀 Staging Deployment Complete!',
              '',
              `**Branch:** \`${context.ref.replace('refs/heads/', '')}\``,
              `**Commit:** \`${context.sha.substring(0, 7)}\``,
              '',
              '### 🔗 URLs',
              '- **Main App:** https://link-content-scraper-staging.fly.dev',
              '- **AI Agent:** https://link-content-scraper-staging.fly.dev/agent',
              '',
              '> Staging auto-suspends when idle — first request may take ~3s to wake.',
            ].join('\n');

            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body,
            });
