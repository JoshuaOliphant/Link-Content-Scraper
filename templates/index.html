<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Link Scraper</title>
  <style>
    :root {
      /* Primary */
      --color-primary: #0070f3;
      --color-primary-hover: #0051cc;
      --color-primary-text: #0070f3;

      /* Neutrals — warm-tinted, not pure gray */
      --color-bg: #f6f5f4;
      --color-surface: #ffffff;
      --color-surface-alt: #f3f2f0;
      --color-text: #2d2a26;
      --color-text-muted: #5c5752;
      --color-border: #d8d5d0;
      --color-disabled: #8a8680;

      /* Semantic — success */
      --color-success-bg: #edf7ed;
      --color-success-text: #276749;
      --color-success-badge-bg: #d4edda;
      --color-success-badge-text: #155724;

      /* Semantic — error */
      --color-error-bg: #fdf2f2;
      --color-error-text: #c53030;
      --color-error-badge-bg: #f8d7da;
      --color-error-badge-text: #721c24;

      /* Semantic — warning / skip */
      --color-skip-badge-bg: #fff3cd;
      --color-skip-badge-text: #856404;

      /* Surfaces */
      --color-shadow: rgba(45, 42, 38, 0.08);
      --color-progress-track: #e8e6e3;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #2563eb;
        --color-primary-hover: #3b82f6;
        --color-primary-text: #60a5fa;

        --color-bg: #1a1a1a;
        --color-surface: #262626;
        --color-surface-alt: #2e2e2e;
        --color-text: #e8e6e3;
        --color-text-muted: #a09b95;
        --color-border: #3d3d3d;
        --color-disabled: #6b6b6b;

        --color-success-bg: #1a2e1a;
        --color-success-text: #6fcf6f;
        --color-success-badge-bg: #1e3a1e;
        --color-success-badge-text: #7cd97c;

        --color-error-bg: #2e1a1a;
        --color-error-text: #f5a3a3;
        --color-error-badge-bg: #3a1e1e;
        --color-error-badge-text: #f5a3a3;

        --color-skip-badge-bg: #2e2a1a;
        --color-skip-badge-text: #e0c86a;

        --color-shadow: rgba(0, 0, 0, 0.3);
        --color-progress-track: #3d3d3d;
      }
    }

    * {
      box-sizing: border-box;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    body {
      font-family: Helvetica, Arial, sans-serif;
      line-height: 1.6;
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
      background: var(--color-bg);
      color: var(--color-text);
    }

    .container {
      background: var(--color-surface);
      padding: 2rem;
      border-radius: 8px;
      box-shadow: 0 2px 4px var(--color-shadow);
    }

    h1 {
      color: var(--color-primary-text);
      margin-bottom: 2rem;
    }

    input {
      font-size: 16px;
      width: 100%;
      padding: 8px 12px;
      border: 2px solid var(--color-border);
      border-radius: 4px;
      margin-bottom: 1rem;
      background: var(--color-surface);
      color: var(--color-text);
    }

    button {
      font-size: 16px;
      padding: 8px 16px;
      background: var(--color-primary);
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      margin-right: 8px;
    }

    button.secondary {
      background: var(--color-text-muted);
    }

    button:hover {
      background: var(--color-primary-hover);
    }

    button.secondary:hover {
      opacity: 0.85;
    }

    button:disabled {
      background: var(--color-disabled);
      cursor: not-allowed;
    }

    button:focus-visible,
    input:focus-visible {
      outline: 2px solid var(--color-primary);
      outline-offset: 2px;
    }

    #status {
      margin-top: 1rem;
      padding: 1rem;
      border-radius: 4px;
    }

    .error {
      background: var(--color-error-bg);
      color: var(--color-error-text);
    }

    .success {
      background: var(--color-success-bg);
      color: var(--color-success-text);
    }

    #progress {
      margin-top: 1rem;
    }

    .progress-bar {
      width: 100%;
      height: 20px;
      background-color: var(--color-progress-track);
      border-radius: 10px;
      overflow: hidden;
      margin: 1rem 0;
      display: none;
    }

    .progress-bar-fill {
      height: 100%;
      background-color: var(--color-primary);
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 0.5rem;
      font-size: 14px;
      color: var(--color-text-muted);
    }

    .status-details {
      margin-top: 1rem;
      padding: 1rem;
      background: var(--color-surface-alt);
      border-radius: 4px;
    }

    .status-counts {
      display: flex;
      gap: 1rem;
      margin-top: 0.5rem;
    }

    .status-counts span {
      padding: 0.25rem 0.5rem;
      border-radius: 4px;
      font-size: 14px;
    }

    .status-counts .success {
      background: var(--color-success-badge-bg);
      color: var(--color-success-badge-text);
    }

    .status-counts .skip {
      background: var(--color-skip-badge-bg);
      color: var(--color-skip-badge-text);
    }

    .status-counts .error {
      background: var(--color-error-badge-bg);
      color: var(--color-error-badge-text);
    }
  </style>
</head>
<body>
  <main class="container">
    <h1>Link Scraper</h1>
    <form id="scrapeForm">
      <label for="urlInput" class="sr-only">Website URL</label>
      <input
        type="url"
        id="urlInput"
        name="urlInput"
        placeholder="Enter website URL"
        required
        aria-describedby="urlHint"
      >
      <small id="urlHint" class="sr-only">Enter a full URL starting with http:// or https://</small>
      <div class="button-group">
        <button type="submit" id="submitBtn">Start Scraping</button>
        <button type="button" id="downloadBtn" class="secondary" disabled>Download Results</button>
      </div>
    </form>
    <div id="status" role="status" aria-live="polite"></div>
    <div class="progress-bar" role="progressbar" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100" aria-label="Scraping progress">
      <div class="progress-bar-fill" style="width: 0%"></div>
    </div>
    <div class="progress-text" aria-live="polite"></div>
    <div id="progress"></div>
  </main>

  <script type="module">
const form = document.getElementById('scrapeForm')
const submitBtn = document.getElementById('submitBtn')
const status = document.getElementById('status')
const progress = document.getElementById('progress')
const progressBar = document.querySelector('.progress-bar')
const progressBarFill = document.querySelector('.progress-bar-fill')
const progressText = document.querySelector('.progress-text')
const downloadBtn = document.getElementById('downloadBtn')

let currentJobId = null
let currentTrackerId = null
let isProcessing = false

// Generate a tracker ID that matches the server's SHA-256 derivation
async function generateTrackerId(url) {
  const encoder = new TextEncoder()
  const data = encoder.encode(url)
  const hashBuffer = await crypto.subtle.digest('SHA-256', data)
  const hashArray = Array.from(new Uint8Array(hashBuffer))
  const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('')
  return hashHex.substring(0, 16)
}

function updateStatusDetails(container, currentUrl, successful, skipped, failed) {
  let details = container.querySelector('.status-details')
  if (!details) {
    details = document.createElement('div')
    details.className = 'status-details'
    container.appendChild(details)
  }

  // Build content safely using DOM methods
  details.textContent = ''

  const p = document.createElement('p')
  p.textContent = 'Currently processing: ' + currentUrl
  details.appendChild(p)

  const counts = document.createElement('div')
  counts.className = 'status-counts'

  const successSpan = document.createElement('span')
  successSpan.className = 'success'
  successSpan.textContent = '\u2713 Successful: ' + successful

  const skipSpan = document.createElement('span')
  skipSpan.className = 'skip'
  skipSpan.textContent = '\u21B7 Skipped: ' + skipped

  const errorSpan = document.createElement('span')
  errorSpan.className = 'error'
  errorSpan.textContent = '\u2717 Failed: ' + failed

  counts.appendChild(successSpan)
  counts.appendChild(skipSpan)
  counts.appendChild(errorSpan)
  details.appendChild(counts)
}

function showFinalResults(container, linkCount, successful, skipped, failed) {
  container.textContent = ''

  const p = document.createElement('p')
  p.textContent = 'Found ' + linkCount + ' links'
  container.appendChild(p)

  const details = document.createElement('div')
  details.className = 'status-details'

  const counts = document.createElement('div')
  counts.className = 'status-counts'

  const successSpan = document.createElement('span')
  successSpan.className = 'success'
  successSpan.textContent = '\u2713 Successful: ' + successful

  const skipSpan = document.createElement('span')
  skipSpan.className = 'skip'
  skipSpan.textContent = '\u21B7 Skipped: ' + skipped

  const errorSpan = document.createElement('span')
  errorSpan.className = 'error'
  errorSpan.textContent = '\u2717 Failed: ' + failed

  counts.appendChild(successSpan)
  counts.appendChild(skipSpan)
  counts.appendChild(errorSpan)
  details.appendChild(counts)
  container.appendChild(details)
}

async function downloadResults(jobId) {
  try {
    const response = await fetch('/api/download/' + jobId)
    if (!response.ok) throw new Error('Download failed')

    const blob = await response.blob()
    const url = window.URL.createObjectURL(blob)
    try {
      const a = document.createElement('a')
      a.href = url
      a.download = 'scraped-content-' + jobId + '.zip'
      document.body.appendChild(a)
      a.click()
      a.remove()
    } finally {
      window.URL.revokeObjectURL(url)
    }
  } catch (error) {
    status.textContent = 'Download error: ' + error.message
    status.className = 'error'
  }
}

downloadBtn.addEventListener('click', () => {
  if (currentJobId) {
    downloadResults(currentJobId)
  }
})

// Handle tab/window close
window.addEventListener('beforeunload', (e) => {
  if (isProcessing && currentTrackerId) {
    e.preventDefault()
    e.returnValue = 'Scraping is in progress. Are you sure you want to leave?'

    // Use sendBeacon for reliable cancel on page unload
    navigator.sendBeacon('/cancel/' + currentTrackerId)

    return e.returnValue
  }
})

form.addEventListener('submit', async (e) => {
  e.preventDefault()

  // Prevent double-submission
  if (isProcessing) return

  const url = new FormData(form).get('urlInput')
  currentTrackerId = await generateTrackerId(url)
  isProcessing = true
  submitBtn.disabled = true

  try {
    status.textContent = 'Starting scrape...'
    status.className = ''
    downloadBtn.disabled = true

    // Set up event source for progress updates
    const eventSource = new EventSource('/api/scrape/progress?url=' + encodeURIComponent(url))

    progressBar.style.display = 'block'
    progressBarFill.style.width = '0%'
    progressBar.setAttribute('aria-valuenow', '0')
    progressText.textContent = 'Starting scrape...'

    eventSource.onmessage = (event) => {
      const data = JSON.parse(event.data)
      const percent = (data.processed / data.total * 100).toFixed(1)
      progressBarFill.style.width = percent + '%'
      progressBar.setAttribute('aria-valuenow', Math.round(percent))
      progressText.textContent = 'Processing: ' + data.processed + ' of ' + data.total + ' links (' + percent + '%)'

      updateStatusDetails(progress, data.current_url, data.successful, data.skipped, data.failed)
    }

    eventSource.onerror = () => {
      eventSource.close()
    }

    const response = await fetch('/api/scrape', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ url: url })
    })

    if (!response.ok) {
      const errorData = await response.json()
      throw new Error(errorData.detail || 'Failed to start scraping')
    }

    const data = await response.json()
    eventSource.close()
    progressBarFill.style.width = '100%'
    progressBar.setAttribute('aria-valuenow', '100')
    progressText.textContent = 'Scraping completed!'

    currentJobId = data.jobId

    // Show final status with download button only if there are successful items
    if (data.successful > 0) {
      status.textContent = 'Scraping completed! Click Download to save the results.'
      status.className = 'success'
      downloadBtn.disabled = false
    } else {
      status.textContent = 'Scraping completed, but no content was successfully retrieved.'
      status.className = 'error'
      downloadBtn.disabled = true
    }

    showFinalResults(progress, data.links.length, data.successful, data.skipped, data.failed)
  } catch (error) {
    status.textContent = 'Error: ' + error.message
    status.className = 'error'
  } finally {
    isProcessing = false
    currentTrackerId = null
    submitBtn.disabled = false
  }
})
</script>
</body>
</html>
